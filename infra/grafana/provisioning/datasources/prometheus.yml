# ─── Grafana Datasource Auto-Provisioning ─────────────────────
# Tự động cấu hình Prometheus làm data source khi Grafana khởi động.
# Không cần login vào UI để add bằng tay.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    orgId: 1
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: '15s'
      httpMethod: POST
